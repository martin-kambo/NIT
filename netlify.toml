# ============================================
# NETLIFY CONFIGURATION - NGOLIBA INFOTRACK
# ============================================

[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'Build complete'"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

# ============================================
# FUNCTIONS CONFIGURATION
# ============================================

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

# ============================================
# REDIRECTS & REWRITES
# ============================================

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/prayer-wall"
  to = "/prayer-wall.html"
  status = 200

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 200

# Catch-all for SPA (if needed)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ============================================
# SECURITY HEADERS
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Admin page - no cache
[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
    Pragma = "no-cache"
    Expires = "0"

# API routes - prevent caching
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag = "noindex, nofollow"

# Static assets - long cache
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images - medium cache
[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ============================================
# CORS HEADERS FOR FUNCTIONS
# ============================================

[[headers]]
  for = "/.netlify/functions/login"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[headers]]
  for = "/.netlify/functions/register"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[headers]]
  for = "/.netlify/functions/vote"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, Cookie"

[[headers]]
  for = "/.netlify/functions/get-results"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Cache-Control = "public, max-age=5"

[[headers]]
  for = "/.netlify/functions/profile"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "PUT, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, Cookie"

[[headers]]
  for = "/.netlify/functions/verify-otp"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[headers]]
  for = "/.netlify/functions/export-data"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, Cookie"

[[headers]]
  for = "/.netlify/functions/webhook"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, x-cron-secret"

[[headers]]
  for = "/.netlify/functions/admin-login"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# ============================================
# FORCE HTTPS REDIRECT
# ============================================

[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://*.netlify.app/*"
  to = "https://tochristforchrist.org/:splat"
  status = 301
  force = true

# ============================================
# CUSTOM 404 PAGE (if needed)
# ============================================

[[redirects]]
  from = "/404"
  to = "/index.html"
  status = 404

# ============================================
# TRAILING SLASH HANDLING
# ============================================

[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = true

# ============================================
# SPROXY CONFIGURATION (if using)
# ============================================

[dev]
  framework = "#custom"
  command = "echo 'Development server running'"
  port = 8888
  targetPort = 8080
  autoLaunch = true

# ============================================
# PLUGINS (optional)
# ============================================

# [[plugins]]
#   package = "@netlify/plugin-gatsby"

# [[plugins]]
#   package = "@netlify/plugin-nextjs"

# ============================================
# ENVIRONMENT VARIABLES (production only)
# ============================================
# These are set in Netlify UI, NOT in this file!
# 
# Required variables:
# - SESSION_SECRET (random 32+ chars)
# - ADMIN_PASSWORD_HASH (SHA-256 of admin password)
# - CRON_SECRET (for webhook authentication)
# 
# Optional variables:
# - AFRICASTALKING_API_KEY (for SMS)
# - AFRICASTALKING_USERNAME
# - RESEND_API_KEY (for email)